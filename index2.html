<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estrazione Dungeon Master</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background-color: #0f172a;
    color: #f8fafc;
  }
  .fade-in {
    animation: fadeIn 0.5s ease-in-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-xl overflow-hidden border border-slate-700">
    <div class="p-6 text-center">
      <h1 class="text-3xl font-bold mb-2 text-emerald-400">Dungeon Master</h1>
      <p class="text-slate-400 mb-8">Estrazione </p>

      <button id="btnEstrai" onclick="estraiDM()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-6 rounded-xl transition-all duration-200 shadow-lg shadow-emerald-900/50 mb-4 active:scale-95">
        Estrai Ora
      </button>

      <button id="btnSalta" onclick="saltaTurno()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 px-6 rounded-xl transition-all duration-200 shadow-lg shadow-amber-900/50 hidden active:scale-95">
        Salta Turno (Indisponibile)
      </button>
    </div>

    <div id="risultatoContainer" class="hidden border-t border-slate-700 bg-slate-900 p-6 fade-in">
      <div class="text-sm text-slate-400 mb-4 space-y-1" id="dettagliCalcolo">
      </div>
      
      <div class="text-center mt-6">
        <span class="text-sm uppercase tracking-wider text-slate-500 font-semibold">Il Dungeon Master è</span>
        <div id="nomeDM" class="text-4xl font-extrabold text-emerald-400 mt-2 break-words">
        </div>
      </div>
    </div>
  </div>

<script>
const nomi = [
  "Enrico",
  "Francesco",
  "Gianluca",
  "Giuliano",
  "Leonardo",
  "Mauro Cancian",
  "Mauro Chiericoni",
  "Roberta",
  "Roberto",
  "Roberto Dolci",
  "Roswit"
];

let indiceCorrente = -1;

function estraiDM() {
  const ora = new Date();
  
  indiceCorrente = Math.floor(Math.random() * nomi.length);

  aggiornaUI(ora.toLocaleString('it-IT'), false);
}

function saltaTurno() {
  if (indiceCorrente === -1) return;
  
  let vecchioIndice = indiceCorrente;
  
  while (indiceCorrente === vecchioIndice) {
    indiceCorrente = Math.floor(Math.random() * nomi.length);
  }
  
  aggiornaUI(new Date().toLocaleString('it-IT'), true);
}

function aggiornaUI(dataOra, isSalto) {
  const container = document.getElementById('risultatoContainer');
  const dettagli = document.getElementById('dettagliCalcolo');
  const nomeDM = document.getElementById('nomeDM');
  const btnSalta = document.getElementById('btnSalta');
  const btnEstrai = document.getElementById('btnEstrai');

  container.classList.remove('hidden');
  
  btnEstrai.textContent = "Nuova Estrazione";
  btnEstrai.classList.replace('bg-emerald-600', 'bg-slate-600');
  btnEstrai.classList.replace('hover:bg-emerald-500', 'hover:bg-slate-500');
  btnEstrai.classList.replace('shadow-emerald-900/50', 'shadow-slate-900/50');
  btnSalta.classList.remove('hidden');

  container.classList.remove('fade-in');
  void container.offsetWidth; 
  container.classList.add('fade-in');

  if (isSalto) {
    dettagli.innerHTML = `<p class="text-amber-400 font-semibold">Turno saltato.</p>
                          <p>È stato sorteggiato a caso un nuovo candidato.</p>`;
    nomeDM.classList.replace('text-emerald-400', 'text-amber-400');
  } else {
    dettagli.innerHTML = `
      <p><span class="font-semibold text-slate-300">Data/Ora estrazione:</span> ${dataOra}</p>
      <p><span class="font-semibold text-emerald-400">Probabilità:</span> Esattamente 1 su ${nomi.length} (${(100 / nomi.length).toFixed(1)}%) per tutti</p>
    `;
    nomeDM.classList.replace('text-amber-400', 'text-emerald-400');
  }

  nomeDM.textContent = nomi[indiceCorrente];
}
</script>

</body>
</html>
