<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estrazione Custode dell'Intento</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #09090b; 
    color: #e4e4e7;
    font-family: 'Cinzel', serif; 
    background-image: radial-gradient(circle at center, #1e1b4b 0%, #09090b 100%); 
  }
  .fade-in {
    animation: fadeIn 1s ease-in-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95) translateY(-10px); text-shadow: 0 0 0px rgba(168, 85, 247, 0); }
    to { opacity: 1; transform: scale(1) translateY(0); text-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
  }
  .mystic-border {
    box-shadow: 0 0 15px rgba(88, 28, 135, 0.4);
    border: 1px solid #4c1d95;
  }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <div class="max-w-md w-full bg-zinc-900 rounded-lg overflow-hidden mystic-border relative">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-purple-600 to-transparent"></div>

    <div class="p-8 text-center">
      <h1 class="text-4xl font-bold mb-2 text-purple-400 tracking-wider uppercase">Custode<br>dell'Intento</h1>
      <p class="text-zinc-500 mb-8 italic">Sincronicità</p>

      <button id="btnEstrai" onclick="estraiDM()" class="w-full bg-purple-900 hover:bg-purple-800 text-purple-100 border border-purple-700 font-bold py-4 px-6 rounded-md transition-all duration-300 shadow-[0_0_15px_rgba(88,28,135,0.6)] hover:shadow-[0_0_25px_rgba(147,51,234,0.8)] mb-4 active:scale-95 uppercase tracking-widest">
        Lascia agire lo Spirito
      </button>

      <button id="btnSalta" onclick="saltaTurno()" class="w-full bg-red-950 hover:bg-red-900 text-red-200 border border-red-800 font-bold py-3 px-6 rounded-md transition-all duration-300 shadow-[0_0_10px_rgba(127,29,29,0.5)] hidden active:scale-95 uppercase text-sm tracking-wider">
        Cedi il Passo (Indisponibile)
      </button>
    </div>

    <div id="risultatoContainer" class="hidden border-t border-purple-900/50 bg-black/60 p-8 fade-in relative">
      <div class="text-xs text-zinc-500 mb-6 space-y-1 font-sans text-center" id="dettagliCalcolo">
      </div>
      
      <div class="text-center mt-4">
        <span class="text-sm uppercase tracking-[0.3em] text-purple-500/70 font-bold">La Guida è</span>
        <div id="nomeDM" class="text-5xl font-extrabold text-purple-300 mt-4 break-words drop-shadow-[0_0_10px_rgba(168,85,247,0.8)]">
        </div>
      </div>
    </div>
  </div>

<script>
const nomi = [
  "Enrico",
  "Francesco",
  "Gianluca",
  "Giuliano",
  "Leonardo",
  "Mauro Cancian",
  "Mauro Chiericoni",
  "Roberta",
  "Roberto",
  "Roberto Dolci",
  "Roswit"
];

let indiceCorrente = -1;

function estraiDM() {
  const ora = new Date();
  
  indiceCorrente = Math.floor(Math.random() * nomi.length);

  aggiornaUI(ora.toLocaleString('it-IT'), false);
}

function saltaTurno() {
  if (indiceCorrente === -1) return;
  
  let vecchioIndice = indiceCorrente;
  
  while (indiceCorrente === vecchioIndice) {
    indiceCorrente = Math.floor(Math.random() * nomi.length);
  }
  
  aggiornaUI(new Date().toLocaleString('it-IT'), true);
}

function aggiornaUI(dataOra, isSalto) {
  const container = document.getElementById('risultatoContainer');
  const dettagli = document.getElementById('dettagliCalcolo');
  const nomeDM = document.getElementById('nomeDM');
  const btnSalta = document.getElementById('btnSalta');
  const btnEstrai = document.getElementById('btnEstrai');

  container.classList.remove('hidden');
  
  btnEstrai.textContent = "Nuova Estrazione";
  btnEstrai.classList.replace('bg-purple-900', 'bg-zinc-800');
  btnEstrai.classList.replace('hover:bg-purple-800', 'hover:bg-zinc-700');
  btnEstrai.classList.replace('border-purple-700', 'border-zinc-700');
  btnEstrai.classList.remove('shadow-[0_0_15px_rgba(88,28,135,0.6)]', 'hover:shadow-[0_0_25px_rgba(147,51,234,0.8)]', 'text-purple-100');
  btnEstrai.classList.add('text-zinc-300');
  
  btnSalta.classList.remove('hidden');

  container.classList.remove('fade-in');
  void container.offsetWidth; 
  container.classList.add('fade-in');

  if (isSalto) {
    dettagli.innerHTML = `<p class="text-red-400 font-bold">Il Custode precedente ha ceduto l'energia.</p>
                          <p>Le trame dell'Intento hanno scelto una nuova guida.</p>`;
    nomeDM.classList.replace('text-purple-300', 'text-red-400');
    nomeDM.classList.replace('drop-shadow-[0_0_10px_rgba(168,85,247,0.8)]', 'drop-shadow-[0_0_10px_rgba(248,113,113,0.8)]');
  } else {
    dettagli.innerHTML = `
      <p><span class="text-zinc-600">Sigillo temporale:</span> ${dataOra}</p>
      <p><span class="text-purple-500">Sincronicità:</span> 1 su ${nomi.length} (${(100 / nomi.length).toFixed(1)}%)</p>
    `;
    nomeDM.classList.replace('text-red-400', 'text-purple-300');
    nomeDM.classList.replace('drop-shadow-[0_0_10px_rgba(248,113,113,0.8)]', 'drop-shadow-[0_0_10px_rgba(168,85,247,0.8)]');
  }

  nomeDM.textContent = nomi[indiceCorrente];
}
</script>

</body>
</html>
